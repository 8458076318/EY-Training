apiVersion: apps/v1
kind: Deployment
metadata:
  name: day-planner-api
  labels:
    app: day-planner-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: day-planner-api
  template:
    metadata:
      labels:
        app: day-planner-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: day-planner-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: day-planner-secrets
            - configMapRef:
                name: day-planner-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
