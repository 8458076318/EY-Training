apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: day-planner-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts: [planner.yourdomain.com]
      secretName: day-planner-tls
  rules:
    - host: planner.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: day-planner-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: day-planner-frontend
                port:
                  number: 8501
